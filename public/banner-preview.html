<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Banner Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Barlow:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: #f0f0f0; }

  /* The banner */
  .sale-banner {
    position: relative;
    width: 100%;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    background: #F59E0B;
  }

  .sale-banner p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    line-height: 1;
    color: #122E85;
  }

  .code-chip {
    display: inline-block;
    background: #122E85;
    color: #fff;
    padding: 2px 10px;
    border-radius: 3px;
    letter-spacing: 2px;
    margin: 0 4px;
    font-weight: 700;
  }

  .dismiss-btn {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(18,46,133,0.7);
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
  }

  /* Fake nav bar for context */
  .fake-nav {
    width: 100%;
    height: 64px;
    background: #122E85;
    display: flex;
    align-items: center;
    padding: 0 40px;
  }
  .fake-nav span {
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  /* Fake page content */
  .fake-content {
    padding: 60px 40px;
    text-align: center;
    color: #555;
    font-size: 14px;
  }

  .label {
    margin-top: 24px;
    font-size: 13px;
    color: #888;
    font-style: italic;
  }
</style>
</head>
<body>

  <div class="sale-banner">
    <p>
      ☀️ Summer Sale &mdash; 20% off all dog training packages. Use code
      <span class="code-chip">SUMMER20</span>
      at checkout.
    </p>
    <button class="dismiss-btn" onclick="this.parentElement.style.display='none'">✕</button>
  </div>

  <div class="fake-nav">
    <span>CALI K9®</span>
  </div>

  <div class="fake-content">
    ↑ Banner preview above (page content would appear here)
    <p class="label">The ✕ button on the right dismisses the banner — try it!</p>
  </div>

</body>
</html>
